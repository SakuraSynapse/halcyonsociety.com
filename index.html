<!DOCTYPE html>
<html lang="en">
<head>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Halcyon Society — Private Membership</title>
    <meta name="description" content="A private society for exceptional individuals across industries, borders, and backgrounds. United not by title or wealth alone, but by character, curiosity, and a genuine desire to lift others as they climb.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400;1,500&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">

    <style>
        /* === RESET === */
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        /* === TOKENS === */
        :root {
            --bg:           #0E0E12;
            --surface:      #13131A;
            --text:         #F5F0E8;
            --muted:        #7A7670;
            --gold:         #C9A96E;
            --gold-bg:      rgba(201,169,110,0.08);
            --border:       rgba(255,255,255,0.07);
            --max:          740px;
            --pad-section:  128px;
        }

        html { scroll-behavior: smooth; }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'Inter', sans-serif;
            font-weight: 300;
            font-size: 17px;
            line-height: 1.85;
            -webkit-font-smoothing: antialiased;
        }

        .wrap {
            max-width: var(--max);
            margin: 0 auto;
            padding: 0 36px;
        }

        .eyebrow {
            display: block;
            font-size: 11px;
            font-weight: 500;
            letter-spacing: 0.28em;
            text-transform: uppercase;
            color: var(--gold);
            margin-bottom: 20px;
        }

        .rule {
            width: 36px;
            height: 1px;
            background: var(--gold);
            margin: 0 auto 64px;
            opacity: 0.6;
        }

        .reveal {
            opacity: 0;
            transform: translateY(18px);
            transition: opacity 0.75s ease, transform 0.75s ease;
        }
        .reveal.in { opacity: 1; transform: none; }

            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 100px 36px;
        }

            width: 160px;
            height: 160px;
            object-fit: contain;
